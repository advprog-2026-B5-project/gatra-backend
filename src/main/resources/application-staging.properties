# ==========================================
# PROFIL STAGING (AZURE)
# ==========================================

# Database Neon.tech (Diambil dari variabel Azure nanti)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# URL Frontend untuk CORS & Target Redirect OAuth2
app.frontend.url=${FRONTEND_URL}

# Rahasia JWT & Google OAuth (Diambil dari variabel Azure nanti)
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}